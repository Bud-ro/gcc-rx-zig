name: CI
on:
  push:
    branches: [master]
    tags: ['v*', '*-full']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev libmpc-dev gawk bison
      - name: Build
        run: zig build -Doptimize=ReleaseFast
        timeout-minutes: 30
      - name: Test - codegen regression suite
        run: zig build test -Doptimize=ReleaseFast
      - name: Build - libgcc
        run: zig build libgcc -Doptimize=ReleaseFast
      - name: Test - libgcc runtime (64-bit integer + builtins)
        run: |
          # RX (RXv1) has a hardware single-precision FPU, so float ops use FPU
          # instructions, not soft-float. The routines that come from libgcc on
          # this target are 64-bit integer math and builtins; assert those link.
          LIBGCC=zig-out/lib/gcc/rx-unknown-elf/14.2.0/libgcc.a
          test -f "$LIBGCC"
          GINC=$(zig-out/bin/rx-elf-gcc -print-file-name=include)
          cat > rt.c <<'EOF'
          volatile long long ia=1000003LL, ib=997LL, ir;
          volatile unsigned uc=0xF0F0F0F0u; volatile int pc;
          void _start(void){ ir=(ia/ib)+(ia%ib)+(ia*ib);
            pc=__builtin_popcount(uc)+__builtin_clz(uc); for(;;){} }
          EOF
          zig-out/bin/rx-elf-gcc -Os -ffreestanding -nostdinc -isystem "$GINC" -c rt.c -o rt.o
          # No --gc-sections here: rt.o's references pull the routines from the
          # libgcc.a archive, which is exactly what we want to assert.
          zig-out/bin/rx-elf-gcc -nostdlib -o rt.elf rt.o "$LIBGCC"
          # confirm the 64-bit/builtin libgcc routines were pulled in
          zig-out/bin/rx-elf-nm rt.elf | grep -E '___(divdi3|moddi3|popcountsi2)'
      - name: Test - crt objects
        run: |
          # crtbegin.o/crtend.o must build and install for the base variant
          # (regression guard: they need -finhibit-size-directive on RX).
          V=zig-out/lib/gcc/rx-unknown-elf/14.2.0
          test -f "$V/crtbegin.o" && test -f "$V/crtend.o"
          zig-out/bin/rx-elf-readelf -h "$V/crtbegin.o" | grep "Renesas RX"
          # the gcc driver must resolve crtbegin.o through its spec: when found
          # it prints an absolute path to a real file; when not, it echoes the
          # bare input name. Assert the former.
          CRTB=$(zig-out/bin/rx-elf-gcc -print-file-name=crtbegin.o)
          test "$CRTB" != "crtbegin.o" && test -f "$CRTB"
      - name: Test - gcc driver
        run: |
          zig-out/bin/rx-elf-gcc --version
          echo 'int x = 42; int get(void) { return x; }' > test.c
          zig-out/bin/rx-elf-gcc -c test.c -o test.o -Os
      - name: Test - relocations
        run: |
          echo 'extern int compute(int,int); int r; int main(void){r=compute(1,2);return r;}' > main.c
          echo 'int compute(int a,int b){return a+b;}' > compute.c
          zig-out/bin/rx-elf-gcc -c main.c -o main.o -Os
          zig-out/bin/rx-elf-gcc -c compute.c -o compute.o -Os
          zig-out/bin/rx-elf-ld main.o compute.o -o linked.elf
      - name: Test - ELF verification
        run: |
          zig-out/bin/rx-elf-readelf -h test.o | grep "Renesas RX"
          zig-out/bin/rx-elf-objdump -d test.o
          zig-out/bin/rx-elf-nm test.o | grep get
      - name: Test - tools
        run: |
          zig-out/bin/rx-elf-strip -o stripped.o test.o
          zig-out/bin/rx-elf-objcopy -O ihex test.o test.hex
          zig-out/bin/rx-elf-size test.o
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Build libgcc and bundle binaries, cc1/libexec, libgcc, and the GPL
          # license/NOTICE. libexec holds cc1 (the compiler proper) which the
          # gcc driver execs, so it must ship in the tarball.
          zig build libgcc -Doptimize=ReleaseFast
          mkdir -p stage/bin stage/lib stage/libexec stage/share/doc
          cp -a zig-out/bin/. stage/bin/
          cp -a zig-out/lib/. stage/lib/ 2>/dev/null || true
          cp -a zig-out/libexec/. stage/libexec/ 2>/dev/null || true
          cp NOTICE.md COPYING COPYING.LIB COPYING3 COPYING3.LIB COPYING.RUNTIME stage/share/doc/
          cp -a vendor/patches stage/share/doc/patches
          tar czf rx-elf-toolchain-linux-x86_64.tar.gz -C stage .
      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rx-elf-toolchain-linux-x86_64.tar.gz
      - name: Stage libgcc artifact
        # The RX libgcc.a / crt objects / target headers are host-independent
        # target object code. A cross-hosted gcc (Windows/macOS) cannot run on
        # this Linux runner to build them, so the cross job reuses these.
        # Exclude the lto_plugin shared object: it is host-specific and the
        # cross build produces its own .dll/.dylib.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          V=gcc/rx-unknown-elf/14.2.0
          mkdir -p "libgcc-artifact/$V"
          cp -a zig-out/lib/$V/*.a zig-out/lib/$V/*.o "libgcc-artifact/$V/"
          if [ -d "zig-out/lib/$V/include" ]; then
            cp -a "zig-out/lib/$V/include" "libgcc-artifact/$V/"
          fi
      - name: Upload libgcc artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: rx-libgcc
          path: libgcc-artifact

  cross:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows-gnu
            name: windows-x86_64
          - target: aarch64-macos
            name: macos-aarch64
          - target: x86_64-macos
            name: macos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install dependencies
        # gmp/mpfr/mpc are built from source for cross hosts; only the
        # build-time generator tools (gawk/bison) come from apt.
        run: sudo apt-get update && sudo apt-get install -y gawk bison
      - name: Build (cross)
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast
        timeout-minutes: 45
      - name: Download libgcc artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@v4
        with:
          name: rx-libgcc
          path: zig-out/lib
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Cross-hosted toolchain binaries + the Linux-built RX libgcc overlay.
          mkdir -p stage/bin stage/lib stage/libexec stage/share/doc
          cp -a zig-out/bin/. stage/bin/
          cp -a zig-out/lib/. stage/lib/ 2>/dev/null || true
          cp -a zig-out/libexec/. stage/libexec/ 2>/dev/null || true
          cp NOTICE.md COPYING COPYING.LIB COPYING3 COPYING3.LIB COPYING.RUNTIME stage/share/doc/
          cp -a vendor/patches stage/share/doc/patches
          tar czf rx-elf-toolchain-${{ matrix.name }}.tar.gz -C stage .
      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rx-elf-toolchain-${{ matrix.name }}.tar.gz
